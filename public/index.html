<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Multiple Dashboard</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Claude Dashboard</h1>
      <div class="header-actions">
        <span id="session-count" class="session-count"></span>
        <button id="btn-new-session" class="btn-action">+ 새 세션</button>
        <button id="btn-terminal-grid" class="btn-action btn-terminal-grid" title="터미널 그리드 뷰">터미널</button>
        <button id="btn-theme" class="btn-theme" title="테마 전환"></button>
        <button id="btn-shortcuts" class="btn-shortcuts" title="단축키 도움말 (?)">?</button>
      </div>
    </header>
    <section id="terminal-grid-view" class="terminal-grid-view" hidden>
      <div class="terminal-grid-header">
        <span id="terminal-grid-count"></span>
        <div class="terminal-grid-header-actions">
          <button id="btn-grid-new-session" class="btn-action">+ 새 세션</button>
          <button id="btn-close-grid" class="btn-action">대시보드</button>
        </div>
      </div>
      <div id="terminal-grid" class="terminal-grid"></div>
    </section>
    <div class="main-layout" id="main-layout">
        <section id="sessions" class="sessions-grid">
          <p class="empty-state">세션 데이터를 불러오는 중...</p>
        </section>
        <section id="stats-section" class="stats-section" hidden>
          <div class="stats-grid" id="stats-grid"></div>
          <div class="stats-tools" id="stats-tools"></div>
          <div class="stats-heatmap" id="stats-heatmap"></div>
        </section>
        <section id="history" class="history-section">
          <div class="history-header">
            <h2 id="history-title">오늘의 활동</h2>
            <div class="history-header-actions">
              <button id="btn-export-json" class="btn-export" title="JSON 내보내기">JSON</button>
              <button id="btn-export-csv" class="btn-export" title="CSV 내보내기">CSV</button>
              <select id="date-filter-history" class="date-select"></select>
            </div>
          </div>
          <div class="history-filters">
            <div class="filter-group" id="event-filters">
              <button class="filter-chip active" data-filter="all">전체</button>
              <button class="filter-chip" data-filter="prompt">💬 프롬프트</button>
              <button class="filter-chip" data-filter="response">🤖 응답</button>
              <button class="filter-chip" data-filter="tool">🔧 도구</button>
              <button class="filter-chip" data-filter="session">세션</button>
            </div>
            <div class="filter-right">
              <input type="text" id="search-input" class="search-input" placeholder="검색..." />
              <select id="project-filter" class="date-select">
                <option value="all">모든 프로젝트</option>
              </select>
            </div>
          </div>
          <div id="history-list"></div>
          <div id="history-footer" class="history-footer" hidden>
            <button id="load-more" class="btn-load-more">더 보기</button>
          </div>
        </section>
      </main>
      <aside id="detail-panel" class="detail-panel" hidden>
        <div class="detail-header">
          <h2 id="detail-title"></h2>
          <div class="detail-actions">
            <button id="detail-export-md" class="btn-export-md" title="Markdown 내보내기">MD</button>
            <button id="detail-kill" class="btn-kill" title="세션 종료">⏹</button>
            <button id="detail-delete" class="btn-delete" title="세션 삭제">🗑</button>
            <button id="detail-close" class="btn-close">&times;</button>
          </div>
        </div>
        <div class="detail-meta" id="detail-meta"></div>
        <div class="detail-tabs" id="detail-tabs">
          <button class="detail-tab active" data-tab="timeline">타임라인</button>
          <button class="detail-tab" data-tab="terminal">터미널 <span id="terminal-status" class="terminal-status-dot"></span></button>
        </div>
        <div class="detail-tab-content" id="tab-timeline">
          <div class="detail-timeline" id="detail-timeline"></div>
        </div>
        <div class="detail-tab-content" id="tab-terminal" hidden>
          <div class="terminal-container" id="terminal-container"></div>
        </div>
      </aside>
    </div>
  </div>
  <div id="shortcuts-panel" class="shortcuts-panel" hidden>
    <div class="shortcuts-header">
      <h3>단축키</h3>
      <button id="shortcuts-close" class="btn-close">&times;</button>
    </div>
    <div class="shortcuts-body">
      <div class="shortcut-group">
        <h4>세션 탐색</h4>
        <div class="shortcut-row"><kbd>j</kbd><span>다음 세션</span></div>
        <div class="shortcut-row"><kbd>k</kbd><span>이전 세션</span></div>
        <div class="shortcut-row"><kbd>Enter</kbd><span>상세 패널 풀뷰 전환</span></div>
        <div class="shortcut-row"><kbd>Esc</kbd><span>패널/모달 닫기</span></div>
      </div>
      <div class="shortcut-group">
        <h4>검색 & 필터</h4>
        <div class="shortcut-row"><kbd>/</kbd><span>검색창 포커스</span></div>
        <div class="shortcut-row"><kbd>Esc</kbd><span>검색창 포커스 해제</span></div>
      </div>
      <div class="shortcut-group">
        <h4>기타</h4>
        <div class="shortcut-row"><kbd>?</kbd><span>이 도움말 토글</span></div>
      </div>
    </div>
  </div>
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title"></h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <pre id="modal-body" class="modal-body"></pre>
    </div>
  </div>
  <div id="launch-modal-overlay" class="modal-overlay">
    <div class="modal" style="max-width:440px">
      <div class="modal-header">
        <h3>새 Claude 세션</h3>
        <button class="modal-close" id="launch-modal-close">&times;</button>
      </div>
      <div style="padding:20px">
        <label class="launch-label">프로젝트 경로</label>
        <input type="text" id="launch-cwd-input" class="launch-input" placeholder="~/my-project" value="~/" autocomplete="off" />
        <label class="launch-label" style="margin-top:12px">실행 방식</label>
        <div class="launch-mode-group">
          <label class="launch-radio"><input type="radio" name="launch-mode" value="pty" checked /> 브라우저 터미널 (PTY)</label>
          <label class="launch-radio"><input type="radio" name="launch-mode" value="terminal" /> 외부 터미널</label>
        </div>
        <div id="terminal-app-group" style="display:none;margin-top:8px">
          <label class="launch-label">터미널 앱</label>
          <select id="launch-terminal-app" class="launch-input" style="font-family:inherit">
            <option value="">시스템 기본</option>
            <option value="Ghostty">Ghostty</option>
            <option value="Terminal">Terminal.app</option>
            <option value="iTerm">iTerm2</option>
            <option value="Warp">Warp</option>
            <option value="Alacritty">Alacritty</option>
          </select>
        </div>
        <div class="launch-actions">
          <button class="btn-cancel" id="launch-cancel-btn">취소</button>
          <button class="btn-launch" id="launch-start-btn">시작</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
